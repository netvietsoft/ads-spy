# Nginx cho dpboss.pet — đặt vào /etc/nginx/sites-available/dpboss.pet rồi symlink sang sites-enabled.
# dpboss.pet  → Web (Next) :3062 ; /api/ → API (Nest) :3063 (timeout dài cho FB scraping).
# Cấp SSL:  sudo certbot --nginx -d dpboss.pet

server {
    listen 80;
    server_name dpboss.pet;

    # API — đặt TRƯỚC location / để ưu tiên. FB scraping lâu → timeout 180s.
    location /api/ {
        proxy_pass http://127.0.0.1:3063;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        client_max_body_size 20m;
    }

    # Web (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3062;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
