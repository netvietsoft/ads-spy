# Nginx cho Ads Spy — 2 domain:
#   dpboss.pet      → Web (Next)  127.0.0.1:3062
#   api.dpboss.pet  → API (Nest)  127.0.0.1:8075  (timeout dài cho FB scraping)
# Đặt vào /etc/nginx/sites-available/dpboss.pet, symlink sang sites-enabled, rồi:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d dpboss.pet -d api.dpboss.pet

# ---- Web ----
server {
    listen 80;
    server_name dpboss.pet;

    location / {
        proxy_pass http://127.0.0.1:3062;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ---- API ----
server {
    listen 80;
    server_name api.dpboss.pet;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8075;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # FB scraping chạy 30-60s → tăng timeout
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
